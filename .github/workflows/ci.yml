name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run tests
        run: uv run --frozen --group dev pytest

      - name: Check dependency health
        run: |
          uv pip check
          # PYSEC-2026-196 is an advisory against the GitHub runner's bundled
          # pip (26.1.1; fixed in 26.1.2) — a build tool, not a project
          # dependency. It fails pip-audit's ambient-env scan and is unrelated
          # to this repo. Ignore it so the gate reflects project deps only;
          # remove once the runner image ships pip >= 26.1.2.
          uv run --frozen --group dev pip-audit --ignore-vuln PYSEC-2026-196
          uv run --frozen --group dev bandit -q -r app scripts

  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: |
          uv sync --frozen --no-dev --group browser
          uv run --frozen --no-dev --group browser playwright install --with-deps chromium

      - name: Run browser smoke
        run: uv run --frozen --no-dev --group browser python scripts/browser_smoke.py
