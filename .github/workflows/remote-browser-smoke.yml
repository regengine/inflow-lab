name: Remote Browser Smoke

on:
  schedule:
    - cron: '47 10 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployed shared-demo base URL
        required: false
        type: string
        default: https://regengine-inflow-lab-production.up.railway.app
      tenant:
        description: Tenant used for isolated remote browser smoke data
        required: false
        type: string
        default: remote-browser-smoke

permissions:
  contents: read

concurrency:
  group: remote-browser-smoke-${{ github.event.inputs.base_url || 'https://regengine-inflow-lab-production.up.railway.app' }}-${{ github.event.inputs.tenant || 'remote-browser-smoke-nightly' }}
  cancel-in-progress: false

jobs:
  remote-browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: |
          uv sync --frozen --no-dev --group browser
          uv run --frozen --no-dev --group browser playwright install --with-deps chromium

      - name: Validate remote browser smoke secrets
        env:
          REGENGINE_REMOTE_USERNAME: ${{ secrets.REGENGINE_REMOTE_USERNAME }}
          REGENGINE_REMOTE_PASSWORD: ${{ secrets.REGENGINE_REMOTE_PASSWORD }}
        run: |
          test -n "$REGENGINE_REMOTE_USERNAME" || { echo "REGENGINE_REMOTE_USERNAME secret is required"; exit 1; }
          test -n "$REGENGINE_REMOTE_PASSWORD" || { echo "REGENGINE_REMOTE_PASSWORD secret is required"; exit 1; }

      - name: Run remote browser smoke
        env:
          REGENGINE_BROWSER_BASE_URL: ${{ github.event.inputs.base_url || 'https://regengine-inflow-lab-production.up.railway.app' }}
          REGENGINE_BROWSER_USERNAME: ${{ secrets.REGENGINE_REMOTE_USERNAME }}
          REGENGINE_BROWSER_PASSWORD: ${{ secrets.REGENGINE_REMOTE_PASSWORD }}
          REGENGINE_BROWSER_TENANT: ${{ github.event.inputs.tenant || 'remote-browser-smoke-nightly' }}
          REGENGINE_BROWSER_EXPECTED_BUILD_SHA: ${{ github.sha }}
        run: uv run --frozen --no-dev --group browser python scripts/browser_smoke.py
