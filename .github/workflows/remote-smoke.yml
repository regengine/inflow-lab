name: Remote Smoke

on:
  schedule:
    - cron: '17 10 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployed shared-demo base URL
        required: false
        type: string
        default: https://regengine-inflow-lab-production.up.railway.app
      tenant:
        description: Tenant used for isolated remote smoke data
        required: false
        type: string
        default: remote-smoke

permissions:
  contents: read

concurrency:
  group: remote-smoke-${{ github.event.inputs.base_url || 'https://regengine-inflow-lab-production.up.railway.app' }}-${{ github.event.inputs.tenant || 'remote-smoke-nightly' }}
  cancel-in-progress: false

jobs:
  remote-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate remote smoke secrets
        env:
          REGENGINE_REMOTE_USERNAME: ${{ secrets.REGENGINE_REMOTE_USERNAME }}
          REGENGINE_REMOTE_PASSWORD: ${{ secrets.REGENGINE_REMOTE_PASSWORD }}
        run: |
          test -n "$REGENGINE_REMOTE_USERNAME" || { echo "REGENGINE_REMOTE_USERNAME secret is required"; exit 1; }
          test -n "$REGENGINE_REMOTE_PASSWORD" || { echo "REGENGINE_REMOTE_PASSWORD secret is required"; exit 1; }

      - name: Run remote smoke
        env:
          REGENGINE_REMOTE_BASE_URL: ${{ github.event.inputs.base_url || 'https://regengine-inflow-lab-production.up.railway.app' }}
          REGENGINE_REMOTE_USERNAME: ${{ secrets.REGENGINE_REMOTE_USERNAME }}
          REGENGINE_REMOTE_PASSWORD: ${{ secrets.REGENGINE_REMOTE_PASSWORD }}
          REGENGINE_REMOTE_TENANT: ${{ github.event.inputs.tenant || 'remote-smoke-nightly' }}
          REGENGINE_EXPECTED_BUILD_SHA: ${{ github.sha }}
        run: python3 scripts/remote_smoke.py
